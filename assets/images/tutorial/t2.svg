<!-- Tutorial Step 2 - Add keys -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <rect width="360" height="280" rx="10" fill="#1a1a1a"/>
  <text x="20" y="35" font-family="Arial" font-size="12" fill="#888">For this setup you will need 2 keys</text>
  <!-- Primary key -->
  <rect x="20" y="52" width="320" height="52" rx="6" fill="#00e87b"/>
  <circle cx="44" cy="78" r="12" fill="#000" opacity="0.2"/>
  <text x="44" y="83" font-family="Arial" font-size="14" fill="#000" text-anchor="middle">🔑</text>
  <text x="66" y="74" font-family="Arial" font-size="14" font-weight="bold" fill="#000">Primary Key</text>
  <text x="66" y="93" font-family="Arial" font-size="11" fill="#004422">Controls spending immediately</text>
  <!-- Inheritance key -->
  <rect x="20" y="116" width="320" height="52" rx="6" fill="#222"/>
  <circle cx="44" cy="142" r="12" fill="#333"/>
  <text x="44" y="147" font-family="Arial" font-size="14" fill="#888" text-anchor="middle">🗝</text>
  <text x="66" y="138" font-family="Arial" font-size="14" fill="#fff">Inheritance Key</text>
  <text x="66" y="157" font-family="Arial" font-size="11" fill="#888">Unlocks after 180 days of inactivity</text>
  <!-- Hardware wallet icons -->
  <rect x="20" y="190" width="95" height="62" rx="6" fill="#222"/>
  <text x="67" y="218" font-family="Arial" font-size="20" text-anchor="middle">🔲</text>
  <text x="67" y="242" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Ledger</text>
  <rect x="132" y="190" width="95" height="62" rx="6" fill="#222"/>
  <text x="179" y="218" font-family="Arial" font-size="20" text-anchor="middle">🔳</text>
  <text x="179" y="242" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Trezor</text>
  <rect x="244" y="190" width="96" height="62" rx="6" fill="#222"/>
  <text x="292" y="218" font-family="Arial" font-size="20" text-anchor="middle">📄</text>
  <text x="292" y="242" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Descriptor</text>
</svg>
