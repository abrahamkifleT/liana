      <stop offset="0%" style="stop-color:#2a3a30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a20;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg1)"/>
  <!-- Person silhouette -->
  <ellipse cx="200" cy="110" rx="45" ry="45" fill="#3a5a40"/>
