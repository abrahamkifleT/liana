<!-- Control section thumb - laptop/shield concept -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <radialGradient id="ctrlGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#00e87b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="500" height="600" fill="url(#ctrlGlow)"/>
  <!-- Shield -->
  <path d="M250 80 L380 140 L380 280 Q380 380 250 440 Q120 380 120 280 L120 140 Z" fill="#0a2a1a" stroke="#00e87b" stroke-width="2"/>
  <path d="M250 110 L360 162 L360 278 Q360 366 250 418 Q140 366 140 278 L140 162 Z" fill="#00e87b" opacity="0.1"/>
  <!-- Bitcoin symbol in shield -->
  <text x="250" y="295" font-family="Arial" font-size="100" font-weight="bold" fill="#00e87b" text-anchor="middle" opacity="0.8">₿</text>
  <!-- Keys around shield -->
  <text x="80" y="200" font-family="Arial" font-size="30" opacity="0.5" fill="#00e87b">🔑</text>
  <text x="385" y="200" font-family="Arial" font-size="30" opacity="0.5" fill="#00e87b">🗝</text>
  <!-- Bottom text -->
  <rect x="120" y="480" width="260" height="40" rx="8" fill="#00e87b" opacity="0.15" stroke="#00e87b" stroke-width="1"/>
  <text x="250" y="506" font-family="Arial" font-size="13" fill="#00e87b" text-anchor="middle">You own your keys</text>
</svg>
